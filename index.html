<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HP-12C Financial Calculator - Web-based replica with RPN logic, financial functions, and authentic HP-12C behavior">
    <title>HP-12C Financial Calculator</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="calculator-container">
        <div class="calculator">
            <!-- Header -->
            <div class="calculator-header">
                <div class="brand">HP-12C</div>
                <div class="subtitle">FINANCIAL PROGRAMMABLE</div>
            </div>

            <!-- Display Module -->
            <div class="display-module">
                <!-- Optional Stack Display -->
                <div class="stack-display" id="stackDisplay" style="display: none;">
                    <span class="stack-level">T: <span id="stackT">0.00</span></span>
                    <span class="stack-level">Z: <span id="stackZ">0.00</span></span>
                    <span class="stack-level">Y: <span id="stackY">0.00</span></span>
                </div>
                
                <!-- Main Display -->
                <div class="display">
                    <div class="display-value" id="displayValue">0.</div>
                </div>
                
                <!-- Status Indicators -->
                <div class="display-indicators">
                    <span class="indicator" id="indUser" title="User mode">USER</span>
                    <span class="indicator" id="indF" title="Gold function prefix">f</span>
                    <span class="indicator" id="indG" title="Blue function prefix">g</span>
                    <span class="indicator" id="indBegin" title="Begin mode">BEGIN</span>
                    <span class="indicator" id="indC" title="Complex mode">C</span>
                    <span class="indicator" id="indRunning" title="Running">⟳</span>
                </div>
            </div>

            <!-- Button Grid -->
            <div class="button-grid">
                <!-- Row 1: Financial Functions -->
                <div class="button-row">
                    <button class="btn btn-financial" data-key="n" 
                            data-primary="n" data-gold="AMORT" data-blue="12×">
                        <span class="label-gold">AMORT</span>
                        <span class="label-primary">n</span>
                        <span class="label-blue">12×</span>
                    </button>
                    <button class="btn btn-financial" data-key="i" 
                            data-primary="i" data-gold="INT" data-blue="12÷">
                        <span class="label-gold">INT</span>
                        <span class="label-primary">i</span>
                        <span class="label-blue">12÷</span>
                    </button>
                    <button class="btn btn-financial" data-key="PV" 
                            data-primary="PV" data-gold="NPV" data-blue="CFo">
                        <span class="label-gold">NPV</span>
                        <span class="label-primary">PV</span>
                        <span class="label-blue">CF<sub>o</sub></span>
                    </button>
                    <button class="btn btn-financial" data-key="PMT" 
                            data-primary="PMT" data-gold="RND" data-blue="CFj">
                        <span class="label-gold">RND</span>
                        <span class="label-primary">PMT</span>
                        <span class="label-blue">CF<sub>j</sub></span>
                    </button>
                    <button class="btn btn-financial" data-key="FV" 
                            data-primary="FV" data-gold="IRR" data-blue="Nj">
                        <span class="label-gold">IRR</span>
                        <span class="label-primary">FV</span>
                        <span class="label-blue">N<sub>j</sub></span>
                    </button>
                </div>

                <!-- Row 2: Prefix and Memory Functions -->
                <div class="button-row">
                    <button class="btn btn-prefix" data-key="f" 
                            data-primary="f">
                        <span class="label-primary prefix-f">f</span>
                    </button>
                    <button class="btn btn-prefix" data-key="g" 
                            data-primary="g">
                        <span class="label-primary prefix-g">g</span>
                    </button>
                    <button class="btn" data-key="STO" 
                            data-primary="STO" data-gold="∫xy" data-blue="∫xr">
                        <span class="label-gold">∫<sub>xy</sub></span>
                        <span class="label-primary">STO</span>
                        <span class="label-blue">∫<sub>xr</sub></span>
                    </button>
                    <button class="btn" data-key="RCL" 
                            data-primary="RCL" data-gold="ŷ,r" data-blue="x̄w">
                        <span class="label-gold">ŷ,r</span>
                        <span class="label-primary">RCL</span>
                        <span class="label-blue">x̄<sub>w</sub></span>
                    </button>
                    <button class="btn" data-key="RS" 
                            data-primary="R/S" data-gold="PSE" data-blue="P/R">
                        <span class="label-gold">PSE</span>
                        <span class="label-primary">R/S</span>
                        <span class="label-blue">P/R</span>
                    </button>
                </div>

                <!-- Row 3: Stack Operations -->
                <div class="button-row">
                    <button class="btn" data-key="SST" 
                            data-primary="SST" data-gold="BST" data-blue="∑">
                        <span class="label-gold">BST</span>
                        <span class="label-primary">SST</span>
                        <span class="label-blue">∑</span>
                    </button>
                    <button class="btn" data-key="Rdown" 
                            data-primary="R↓" data-gold="GTO" data-blue="x≤y">
                        <span class="label-gold">GTO</span>
                        <span class="label-primary">R↓</span>
                        <span class="label-blue">x≤y</span>
                    </button>
                    <button class="btn" data-key="xy" 
                            data-primary="x⟷y" data-gold="x=0" data-blue="CLΣ">
                        <span class="label-gold">x=0</span>
                        <span class="label-primary">x⟷y</span>
                        <span class="label-blue">CLΣ</span>
                    </button>
                    <button class="btn" data-key="CLx" 
                            data-primary="CLx" data-gold="SL" data-blue="DB">
                        <span class="label-gold">SL</span>
                        <span class="label-primary">CLx</span>
                        <span class="label-blue">DB</span>
                    </button>
                    <button class="btn btn-enter" data-key="ENTER">
                        <span class="label-primary enter-label">ENTER</span>
                    </button>
                </div>

                <!-- Row 4: Numbers 7-9 and Divide -->
                <div class="button-row">
                    <button class="btn btn-number" data-key="7" 
                            data-primary="7" data-gold="FIX" data-blue="SOYD">
                        <span class="label-gold">FIX</span>
                        <span class="label-primary">7</span>
                        <span class="label-blue">SOYD</span>
                    </button>
                    <button class="btn btn-number" data-key="8" 
                            data-primary="8" data-gold="SCI" data-blue="DATE">
                        <span class="label-gold">SCI</span>
                        <span class="label-primary">8</span>
                        <span class="label-blue">DATE</span>
                    </button>
                    <button class="btn btn-number" data-key="9" 
                            data-primary="9" data-gold="ENG" data-blue="DYS">
                        <span class="label-gold">ENG</span>
                        <span class="label-primary">9</span>
                        <span class="label-blue">DYS</span>
                    </button>
                    <button class="btn btn-operator" data-key="divide" 
                            data-primary="÷" data-gold="BOND" data-blue="DBY">
                        <span class="label-gold">BOND</span>
                        <span class="label-primary">÷</span>
                        <span class="label-blue">DBY</span>
                    </button>
                </div>

                <!-- Row 5: Numbers 4-6 and Multiply -->
                <div class="button-row">
                    <button class="btn btn-number" data-key="4" 
                            data-primary="4" data-gold="ΔDYS" data-blue="Δ%">
                        <span class="label-gold">ΔDYS</span>
                        <span class="label-primary">4</span>
                        <span class="label-blue">Δ%</span>
                    </button>
                    <button class="btn btn-number" data-key="5" 
                            data-primary="5" data-gold="D.MY" data-blue="x̄">
                        <span class="label-gold">D.MY</span>
                        <span class="label-primary">5</span>
                        <span class="label-blue">x̄</span>
                    </button>
                    <button class="btn btn-number" data-key="6" 
                            data-primary="6" data-gold="M.DY" data-blue="s">
                        <span class="label-gold">M.DY</span>
                        <span class="label-primary">6</span>
                        <span class="label-blue">s</span>
                    </button>
                    <button class="btn btn-operator" data-key="multiply" 
                            data-primary="×" data-gold="PRICE" data-blue="L.R.">
                        <span class="label-gold">PRICE</span>
                        <span class="label-primary">×</span>
                        <span class="label-blue">L.R.</span>
                    </button>
                </div>

                <!-- Row 6: Numbers 1-3 and Subtract -->
                <div class="button-row">
                    <button class="btn btn-number" data-key="1" 
                            data-primary="1" data-gold="YTM" data-blue="x!">
                        <span class="label-gold">YTM</span>
                        <span class="label-primary">1</span>
                        <span class="label-blue">x!</span>
                    </button>
                    <button class="btn btn-number" data-key="2" 
                            data-primary="2" data-gold="e^x" data-blue="LN">
                        <span class="label-gold">e<sup>x</sup></span>
                        <span class="label-primary">2</span>
                        <span class="label-blue">LN</span>
                    </button>
                    <button class="btn btn-number" data-key="3" 
                            data-primary="3" data-gold="10^x" data-blue="LOG">
                        <span class="label-gold">10<sup>x</sup></span>
                        <span class="label-primary">3</span>
                        <span class="label-blue">LOG</span>
                    </button>
                    <button class="btn btn-operator" data-key="subtract" 
                            data-primary="−" data-gold="YLD" data-blue="y^x">
                        <span class="label-gold">YLD</span>
                        <span class="label-primary">−</span>
                        <span class="label-blue">y<sup>x</sup></span>
                    </button>
                </div>

                <!-- Row 7: Special keys and Add -->
                <div class="button-row">
                    <button class="btn btn-on" data-key="ON">
                        <span class="label-primary on-label">ON</span>
                    </button>
                    <button class="btn btn-number" data-key="0" 
                            data-primary="0" data-gold="√x" data-blue="x²">
                        <span class="label-gold">√x</span>
                        <span class="label-primary">0</span>
                        <span class="label-blue">x²</span>
                    </button>
                    <button class="btn btn-decimal" data-key="decimal" 
                            data-primary="." data-gold="1/x" data-blue="Frac">
                        <span class="label-gold">1/x</span>
                        <span class="label-primary">.</span>
                        <span class="label-blue">FRAC</span>
                    </button>
                    <button class="btn" data-key="SigmaPlus" 
                            data-primary="Σ+" data-gold="%" data-blue="Σ−">
                        <span class="label-gold">%</span>
                        <span class="label-primary">Σ+</span>
                        <span class="label-blue">Σ−</span>
                    </button>
                    <button class="btn btn-operator" data-key="add" 
                            data-primary="+" data-gold="CHS" data-blue="LSTX">
                        <span class="label-gold">CHS</span>
                        <span class="label-primary">+</span>
                        <span class="label-blue">LSTX</span>
                    </button>
                </div>
            </div>

            <!-- Optional Control Panel -->
            <div class="control-panel" id="controlPanel" style="display: none;">
                <button class="control-btn" id="btnHelp" title="Help">❓</button>
                <button class="control-btn" id="btnSettings" title="Settings">⚙️</button>
                <button class="control-btn" id="btnTheme" title="Change Theme">🎨</button>
                <button class="control-btn" id="btnSound" title="Toggle Sound">🔊</button>
                <button class="control-btn" id="btnStats" title="Statistics">📊</button>
            </div>
        </div>

        <!-- Help Panel (Hidden by default) -->
        <div class="help-panel" id="helpPanel" style="display: none;">
            <div class="help-content">
                <h3>HP-12C Quick Help</h3>
                <p>This calculator uses RPN (Reverse Polish Notation)</p>
                <button id="closeHelp">Close</button>
            </div>
        </div>
    </div>

    <!-- JavaScript Modules -->
    <script src="js/rpn-stack.js"></script>
    <script src="js/display.js"></script>
    <script src="js/memory.js"></script>
    <script src="js/financial.js"></script>
    <script src="js/keyboard.js"></script>
    <script src="js/calculator.js"></script>
    
    <!-- Initialize Calculator -->
    <script>
        // Calculator will be initialized once all components are implemented
        let calculator;
        
        document.addEventListener('DOMContentLoaded', () => {
            console.log('HP-12C Calculator loaded - Implementation in progress');
            // calculator = new Calculator();
            // Full initialization will be added in Phase 2.1
        });
    </script>
</body>
</html>
