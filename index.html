<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HP-12C Financial Calculator - Authentic web-based replica with RPN logic, financial functions, and authentic HP-12C appearance">
    <title>HP-12C Financial Calculator</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="calculator-container">
        <div class="calculator">
            <!-- Black Case Border -->
            <div class="calculator-case">
                <!-- Gold Metallic Front Plate -->
                <div class="front-plate">
                    <!-- Header Branding -->
                    <div class="calculator-header">
                        <div class="logo-hp">hp</div>
                        <div class="logo-model">
                            <span class="model-badge">hp 12C</span>
                        </div>
                    </div>

                    <!-- Display Module -->
                    <div class="display-module">
                        <!-- Main LCD Display -->
                        <div class="display">
                            <div class="display-bezel">
                                <div class="lcd-window">
                                    <div class="display-value" id="displayValue">0.</div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Status Indicators -->
                        <div class="display-indicators">
                            <span class="indicator" id="indUser">USER</span>
                            <span class="indicator" id="indF">f</span>
                            <span class="indicator" id="indG">g</span>
                            <span class="indicator" id="indBegin">BEGIN</span>
                            <span class="indicator" id="indGrad">GRAD</span>
                            <span class="indicator" id="indDmy">D.MY</span>
                            <span class="indicator" id="indC">C</span>
                            <span class="indicator" id="indPrgm">PRGM</span>
                        </div>
                    </div>

                    <!-- Button Grid -->
                    <div class="button-grid">
                        <!-- Row 1: Financial Functions -->
                        <button class="btn" data-key="n">
                            <span class="label-gold">AMORT</span>
                            <span class="label-primary">n</span>
                            <span class="label-blue">12×</span>
                        </button>
                        <button class="btn" data-key="i">
                            <span class="label-gold">INT</span>
                            <span class="label-primary">i</span>
                            <span class="label-blue">12÷</span>
                        </button>
                        <button class="btn" data-key="PV">
                            <span class="label-gold">NPV</span>
                            <span class="label-primary">PV</span>
                            <span class="label-blue">CF<sub>o</sub></span>
                        </button>
                        <button class="btn" data-key="PMT">
                            <span class="label-gold">RND</span>
                            <span class="label-primary">PMT</span>
                            <span class="label-blue">CF<sub>j</sub></span>
                        </button>
                        <button class="btn" data-key="FV">
                            <span class="label-gold">IRR</span>
                            <span class="label-primary">FV</span>
                            <span class="label-blue">N<sub>j</sub></span>
                        </button>

                        <!-- Row 2: CHS and Numbers 7-9, Divide -->
                        <button class="btn" data-key="CHS">
                            <span class="label-gold">DATE</span>
                            <span class="label-primary">CHS</span>
                            <span class="label-blue">BEG</span>
                        </button>
                        <button class="btn btn-number" data-key="7">
                            <span class="label-gold">MEM</span>
                            <span class="label-primary">7</span>
                            <span class="label-blue">FIX</span>
                        </button>
                        <button class="btn btn-number" data-key="8">
                            <span class="label-gold">END</span>
                            <span class="label-primary">8</span>
                            <span class="label-blue">SCI</span>
                        </button>
                        <button class="btn btn-number" data-key="9">
                            <span class="label-gold">MEM</span>
                            <span class="label-primary">9</span>
                            <span class="label-blue">ENG</span>
                        </button>
                        <button class="btn btn-operator" data-key="divide">
                            <span class="label-gold"> </span>
                            <span class="label-primary">÷</span>
                            <span class="label-blue"> </span>
                        </button>

                        <!-- Row 3: y^x, 1/x, %T, Δ%, % and EEX -->
                        <button class="btn" data-key="yx">
                            <span class="label-gold">PRICE</span>
                            <span class="label-primary">y<sup>x</sup></span>
                            <span class="label-blue">√x</span>
                        </button>
                        <button class="btn" data-key="1x">
                            <span class="label-gold">YTM</span>
                            <span class="label-primary">1/x</span>
                            <span class="label-blue">e<sup>x</sup></span>
                        </button>
                        <button class="btn" data-key="PT">
                            <span class="label-gold">SL</span>
                            <span class="label-primary">%T</span>
                            <span class="label-blue">LN</span>
                        </button>
                        <button class="btn" data-key="DP">
                            <span class="label-gold">SOYD</span>
                            <span class="label-primary">Δ%</span>
                            <span class="label-blue">FRAC</span>
                        </button>
                        <button class="btn" data-key="PCT">
                            <span class="label-gold">DB</span>
                            <span class="label-primary">%</span>
                            <span class="label-blue">INTG</span>
                        </button>
                        <button class="btn" data-key="EEX">
                            <span class="label-gold"> </span>
                            <span class="label-primary">EEX</span>
                            <span class="label-blue"> </span>
                        </button>

                        <!-- Row 4: Numbers 4-6, Multiply -->
                        <button class="btn btn-number" data-key="4">
                            <span class="label-gold">ΔDYS</span>
                            <span class="label-primary">4</span>
                            <span class="label-blue">D.MY</span>
                        </button>
                        <button class="btn btn-number" data-key="5">
                            <span class="label-gold"> </span>
                            <span class="label-primary">5</span>
                            <span class="label-blue">M.DY</span>
                        </button>
                        <button class="btn btn-number" data-key="6">
                            <span class="label-gold"> </span>
                            <span class="label-primary">6</span>
                            <span class="label-blue">x<sub>w</sub></span>
                        </button>
                        <button class="btn btn-operator" data-key="multiply">
                            <span class="label-gold"> </span>
                            <span class="label-primary">×</span>
                            <span class="label-blue"> </span>
                        </button>

                        <!-- Row 5: R/S, SST, R↓, x⟷y, CLx, ENTER -->
                        <button class="btn" data-key="RS">
                            <span class="label-gold">PSE</span>
                            <span class="label-primary">R/S</span>
                            <span class="label-blue">P/R</span>
                        </button>
                        <button class="btn" data-key="SST">
                            <span class="label-gold">BST</span>
                            <span class="label-primary">SST</span>
                            <span class="label-blue">Σ</span>
                        </button>
                        <button class="btn" data-key="Rdown">
                            <span class="label-gold">GTO</span>
                            <span class="label-primary">R↓</span>
                            <span class="label-blue">x≤y</span>
                        </button>
                        <button class="btn" data-key="xy">
                            <span class="label-gold">x=0</span>
                            <span class="label-primary">x⟷y</span>
                            <span class="label-blue">CLΣ</span>
                        </button>
                        <button class="btn" data-key="CLx">
                            <span class="label-gold">∫<sub>xy</sub></span>
                            <span class="label-primary">CLx</span>
                            <span class="label-blue">∫<sub>xr</sub></span>
                        </button>
                        <button class="btn btn-enter" data-key="ENTER">
                            <span class="label-primary enter-label">ENTER ↑</span>
                        </button>

                        <!-- Row 6: Numbers 1-3, Subtract -->
                        <button class="btn btn-number" data-key="1">
                            <span class="label-gold">YLD</span>
                            <span class="label-primary">1</span>
                            <span class="label-blue">10<sup>x</sup></span>
                        </button>
                        <button class="btn btn-number" data-key="2">
                            <span class="label-gold"> </span>
                            <span class="label-primary">2</span>
                            <span class="label-blue">LOG</span>
                        </button>
                        <button class="btn btn-number" data-key="3">
                            <span class="label-gold"> </span>
                            <span class="label-primary">3</span>
                            <span class="label-blue">y<sup>x</sup></span>
                        </button>
                        <button class="btn btn-operator" data-key="subtract">
                            <span class="label-gold"> </span>
                            <span class="label-primary">−</span>
                            <span class="label-blue"> </span>
                        </button>

                        <!-- Row 7: ON, 0, ., Σ+, + -->
                        <button class="btn btn-on" data-key="ON">
                            <span class="label-primary on-label">ON</span>
                        </button>
                        <button class="btn btn-number" data-key="0">
                            <span class="label-gold">BOND</span>
                            <span class="label-primary">0</span>
                            <span class="label-blue">x²</span>
                        </button>
                        <button class="btn btn-decimal" data-key="decimal">
                            <span class="label-gold">DBY</span>
                            <span class="label-primary">.</span>
                            <span class="label-blue">1/x</span>
                        </button>
                        <button class="btn" data-key="SigmaPlus">
                            <span class="label-gold">%</span>
                            <span class="label-primary">Σ+</span>
                            <span class="label-blue">Σ−</span>
                        </button>
                        <button class="btn btn-operator" data-key="add">
                            <span class="label-gold"> </span>
                            <span class="label-primary">+</span>
                            <span class="label-blue"> </span>
                        </button>

                        <!-- Row 8: f, g, STO, RCL -->
                        <button class="btn btn-prefix btn-f" data-key="f">
                            <span class="label-primary prefix-f">f</span>
                        </button>
                        <button class="btn btn-prefix btn-g" data-key="g">
                            <span class="label-primary prefix-g">g</span>
                        </button>
                        <button class="btn" data-key="STO">
                            <span class="label-gold">ŷ,r</span>
                            <span class="label-primary">STO</span>
                            <span class="label-blue">x̄</span>
                        </button>
                        <button class="btn" data-key="RCL">
                            <span class="label-gold">L.R.</span>
                            <span class="label-primary">RCL</span>
                            <span class="label-blue">s</span>
                        </button>
                    </div>

                    <!-- Footer Branding -->
                    <div class="calculator-footer">
                        <div class="brand-hp">HEWLETT·PACKARD</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript Modules -->
    <script src="js/rpn-stack.js"></script>
    <script src="js/display.js"></script>
    <script src="js/memory.js"></script>
    <script src="js/financial.js"></script>
    <script src="js/keyboard.js"></script>
    <script src="js/calculator.js"></script>
    
    <!-- Initialize Calculator -->
    <script>
        let calculator;
        
        document.addEventListener('DOMContentLoaded', () => {
            console.log('HP-12C Calculator loaded - Authentic visual design');
        });
    </script>
</body>
</html>
