<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HP-12C Financial Calculator - Authentic web-based replica with RPN logic, financial functions, and authentic HP-12C appearance">
    <title>HP-12C Financial Calculator</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navigation Link -->
    <div style="position: fixed; top: 20px; right: 20px; z-index: 10000;">
        <a href="docs/examples.html" style="display: inline-block; padding: 12px 24px; background: linear-gradient(135deg, #d8942b, #1f97da); color: white; text-decoration: none; border-radius: 50px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: all 0.3s ease; font-family: Arial, sans-serif;">
            📚 Examples & Tutorials
        </a>
    </div>

    <!-- Learn Mode Control -->
    <div class="learn-mode-control" role="region" aria-label="Learning Mode Controls">
        <div class="learn-toggle-container">
            <label for="learnModeToggle" class="learn-toggle-label">
                <span class="learn-icon">📚</span>
                <span class="learn-label-text">Learn Mode</span>
            </label>
            <button
                id="learnModeToggle"
                class="learn-toggle-button"
                role="switch"
                aria-checked="false"
                aria-label="Toggle Learn Mode - Enable to click keys for detailed information"
            >
                <span class="toggle-slider"></span>
                <span class="toggle-state-text" aria-live="polite">OFF</span>
            </button>
            <p class="learn-mode-hint">
                <span class="hint-default">Hover any key for quick info</span>
                <span class="hint-active">Click any key to see detailed information</span>
            </p>
        </div>
    </div>

    <div class="hp12c" aria-label="HP-12C Financial Calculator">
        <!-- Top Gold Plate -->
        <div class="top-plate"></div>

        <!-- LCD Display -->
        <div class="display">
            <div class="digits">
                <span id="displayValue">0.</span>
            </div>
        </div>

        <!-- Logo Badge -->
        <div class="logo" aria-hidden="true">
            <div class="hp">hp</div>
            <div class="model">12c</div>
        </div>

        <!-- Keyboard Shell -->
        <div class="keyboard-shell">
            <div class="keyboard-border"></div>

            <div class="key-area">
                <!-- Gold Label Row 1 -->
                <div class="gold-text" style="grid-column:1;grid-row:1;">AMORT</div>
                <div class="gold-text" style="grid-column:2;grid-row:1;">INT</div>
                <div class="gold-text" style="grid-column:3;grid-row:1;">NPV</div>
                <div class="gold-text" style="grid-column:4;grid-row:1;">RND</div>
                <div class="gold-text" style="grid-column:5;grid-row:1;">IRR</div>

                <!-- Row 1: Financial Keys -->
                <button class="key fn" style="grid-column:1;grid-row:2;" data-key="n">
                    <span class="main">n</span>
                    <span class="blue">12×</span>
                </button>
                <button class="key fn" style="grid-column:2;grid-row:2;" data-key="i">
                    <span class="main">i</span>
                    <span class="blue">12÷</span>
                </button>
                <button class="key medium" style="grid-column:3;grid-row:2;" data-key="pv">
                    <span class="main">PV</span>
                    <span class="blue">CFo</span>
                </button>
                <button class="key medium" style="grid-column:4;grid-row:2;" data-key="pmt">
                    <span class="main">PMT</span>
                    <span class="blue">CFj</span>
                </button>
                <button class="key medium" style="grid-column:5;grid-row:2;" data-key="fv">
                    <span class="main">FV</span>
                    <span class="blue">Nj</span>
                </button>
                <button class="key medium" style="grid-column:6;grid-row:2;" data-key="chs">
                    <span class="main">CHS</span>
                    <span class="blue">DATE</span>
                </button>
                <button class="key" style="grid-column:7;grid-row:2;" data-key="digit-7">
                    <span class="main">7</span>
                    <span class="blue">BEG</span>
                </button>
                <button class="key" style="grid-column:8;grid-row:2;" data-key="digit-8">
                    <span class="main">8</span>
                    <span class="blue">END</span>
                </button>
                <button class="key" style="grid-column:9;grid-row:2;" data-key="digit-9">
                    <span class="main">9</span>
                    <span class="blue">MEM</span>
                </button>
                <button class="key small" style="grid-column:10;grid-row:2;" data-key="op-divide">
                    <span class="main">÷</span>
                </button>

                <!-- Gold Label Row 2: PRICE/BOND/YTM and SL/DEPRECIATION/SOYD/DB -->
                <div class="group-label" style="grid-column:1 / span 2; grid-row:3;">
                    <span>PRICE</span>
                    <span>BOND</span>
                    <span>YTM</span>
                </div>
                <div class="group-label" style="grid-column:3 / span 3; grid-row:3;">
                    <span>SL</span>
                    <span class="center-stack"><span>DEPRECIATION</span><span>SOYD</span></span>
                    <span>DB</span>
                </div>

                <!-- Row 2: Scientific Keys -->
                <button class="key medium" style="grid-column:1;grid-row:4;" data-key="power-yx">
                    <span class="main">yˣ</span>
                    <span class="blue">√x</span>
                </button>
                <button class="key medium" style="grid-column:2;grid-row:4;" data-key="reciprocal">
                    <span class="main">1/x</span>
                    <span class="blue">eˣ</span>
                </button>
                <button class="key medium" style="grid-column:3;grid-row:4;" data-key="percent-total">
                    <span class="main">%T</span>
                    <span class="blue">LN</span>
                </button>
                <button class="key medium" style="grid-column:4;grid-row:4;" data-key="delta-percent">
                    <span class="main">Δ%</span>
                    <span class="blue">FRAC</span>
                </button>
                <button class="key medium" style="grid-column:5;grid-row:4;" data-key="percent">
                    <span class="main">%</span>
                    <span class="blue">INTG</span>
                </button>
                <button class="key medium" style="grid-column:6;grid-row:4;" data-key="eex">
                    <span class="main">EEX</span>
                    <span class="blue">ΔDYS</span>
                </button>
                <button class="key" style="grid-column:7;grid-row:4;" data-key="digit-4">
                    <span class="main">4</span>
                    <span class="blue">D.MY</span>
                </button>
                <button class="key" style="grid-column:8;grid-row:4;" data-key="digit-5">
                    <span class="main">5</span>
                    <span class="blue">M.DY</span>
                </button>
                <button class="key" style="grid-column:9;grid-row:4;" data-key="digit-6">
                    <span class="main">6</span>
                    <span class="blue">x̄w</span>
                </button>
                <button class="key small" style="grid-column:10;grid-row:4;" data-key="op-multiply">
                    <span class="main">×</span>
                </button>

                <!-- Gold Label Row 3: P/R, Σ, PRGM/CLEAR/FIN/REG/PREFIX -->
                <div class="gold-text" style="grid-column:1;grid-row:5;">P/R</div>
                <div class="gold-text" style="grid-column:2;grid-row:5;">Σ</div>
                <div class="group-program" style="grid-column:3 / span 4; grid-row:5;">
                    <span>PRGM</span>
                    <span class="stacked"><span>CLEAR</span><span>FIN</span></span>
                    <span>REG</span>
                    <span>PREFIX</span>
                </div>

                <!-- Row 3: Stack Operations -->
                <button class="key medium" style="grid-column:1;grid-row:6;" data-key="rs">
                    <span class="main">R/S</span>
                    <span class="blue">PSE</span>
                </button>
                <button class="key medium" style="grid-column:2;grid-row:6;" data-key="sst">
                    <span class="main">SST</span>
                    <span class="blue">BST</span>
                </button>
                <button class="key medium" style="grid-column:3;grid-row:6;" data-key="roll-down">
                    <span class="main">R↓</span>
                    <span class="blue">GTO</span>
                </button>
                <button class="key medium" style="grid-column:4;grid-row:6;" data-key="swap-xy">
                    <span class="main">x↔y</span>
                    <span class="blue">x&lt;&gt;y</span>
                </button>
                <button class="key medium" style="grid-column:5;grid-row:6;" data-key="clx">
                    <span class="main">CLx</span>
                    <span class="blue">x=0</span>
                </button>
                <button class="key enter" data-key="enter">
                    <span class="main">ENTER</span>
                    <span class="blue">LSTx</span>
                </button>
                <button class="key" style="grid-column:7;grid-row:6;" data-key="digit-1">
                    <span class="main">1</span>
                    <span class="blue">ŷ,r</span>
                </button>
                <button class="key" style="grid-column:8;grid-row:6;" data-key="digit-2">
                    <span class="main">2</span>
                    <span class="blue">x̂,r</span>
                </button>
                <button class="key" style="grid-column:9;grid-row:6;" data-key="digit-3">
                    <span class="main">3</span>
                    <span class="blue">n!</span>
                </button>
                <button class="key small" style="grid-column:10;grid-row:6;" data-key="op-subtract">
                    <span class="main">−</span>
                </button>

                <!-- Row 4: Bottom Row -->
                <button class="key medium on" style="grid-column:1;grid-row:7;" data-key="on">
                    <span class="main">ON</span>
                </button>
                <button class="key f fn" style="grid-column:2;grid-row:7;" data-key="prefix-f">
                    <span class="main">f</span>
                </button>
                <button class="key g fn" style="grid-column:3;grid-row:7;" data-key="prefix-g">
                    <span class="main">g</span>
                </button>
                <button class="key medium" style="grid-column:4;grid-row:7;" data-key="sto">
                    <span class="main">STO</span>
                </button>
                <button class="key medium" style="grid-column:5;grid-row:7;" data-key="rcl">
                    <span class="main">RCL</span>
                </button>
                <button class="key" style="grid-column:7;grid-row:7;" data-key="digit-0">
                    <span class="main">0</span>
                    <span class="blue">x̄</span>
                </button>
                <button class="key" style="grid-column:8;grid-row:7;" data-key="decimal">
                    <span class="main">.</span>
                    <span class="blue">s</span>
                </button>
                <button class="key medium" style="grid-column:9;grid-row:7;" data-key="sigma-plus">
                    <span class="main">Σ+</span>
                    <span class="blue">Σ−</span>
                </button>
                <button class="key small" style="grid-column:10;grid-row:7;" data-key="op-add">
                    <span class="main">+</span>
                </button>
            </div>

            <!-- Brand Strip -->
            <div class="brand-strip">
                <div class="brand">HEWLETT·PACKARD</div>
            </div>
        </div>
    </div>

    <!-- JavaScript Modules -->
    <script src="js/rpn-stack.js"></script>
    <script src="js/display.js"></script>
    <script src="js/memory.js"></script>
    <script src="js/financial.js"></script>
    <script src="js/math-functions.js"></script>
    <script src="js/keyboard.js"></script>
    <script src="js/key-metadata.js"></script>
    <script src="js/key-info.js"></script>
    <script src="js/calculator.js"></script>
    
    <!-- Initialize Calculator -->
    <script>
        let calculator;
        
        document.addEventListener('DOMContentLoaded', () => {
            console.log('HP-12C Calculator loaded - Superior authentic design applied');
        });
    </script>
</body>
</html>
